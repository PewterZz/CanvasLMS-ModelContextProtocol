# smithery.yaml configuration file
# Docs: https://smithery.ai/docs/config#smitheryyaml

version: 0.1.0 # Check Smithery docs for current version

# Basic information about your tool
info:
  name: CanvasLMS-ModelContextProtocol
  title: Canvas LMS Model Context Protocol with lazy authentication for Smithery
  description: Provides access to Canvas LMS data like assignments, files, and PDF text via the Canvas API.

# --- Start Command Configuration --- Required Section ---
startCommand:
  # Indicates the MCP communicates over standard input/output
  type: stdio

  # Defines the configuration options the user needs to provide in Smithery
  configSchema:
    type: object
    required:
      - canvasApiUrl
      - canvasApiToken
      - awsApiUrl
      - awsCanvasApiToken
      # Add other required env vars if your server needs them
    properties:
      canvasApiUrl:
        type: string
        description: The base URL of the Canvas instance (e.g., https://your.instructure.com).
      canvasApiToken:
        type: string
        description: The Canvas API access token with necessary permissions.
      awsApiUrl:
        type: string
        description: The base URL of the AWS API Gateway endpoint for PDF extraction.
      awsCanvasApiToken:
        type: string
        description: The API token required to authenticate with the AWS API Gateway.
      # Example optional variable:
      # logLevel:
      #   type: string
      #   description: Log level for the server (e.g., info, debug).
      #   default: info

  # Function to generate the command line instruction to start the server
  commandFunction:
    # Takes the config object (from configSchema) and returns command details
    # This example uses 'npm start' and passes config values as environment variables
    |-
      (config) => ({
        "command": "npm",
        "args": ["start"],
        "env": {
          "CANVAS_API_URL": config.canvasApiUrl,
          "CANVAS_API_TOKEN": config.canvasApiToken,
          "AWS_API_URL": config.awsApiUrl,
          "AWS_CANVAS_API_TOKEN": config.awsCanvasApiToken,
          "PORT": process.env.PORT || "3000" # Smithery might set PORT, otherwise default
          # Add other env vars based on configSchema here if needed
          # "LOG_LEVEL": config.logLevel
        }
      })

# How Smithery should connect to your deployed API
# Use environment variables provided by your deployment platform if possible
# The base URL of your *deployed* server (e.g., from Render)
# It's often best practice to use an environment variable here
server:
  url: ${env.MCP_SERVER_URL} # Example: using an env var set during deployment

# Authentication (if your MCP server itself required an API key - currently it doesn't)
# auth:
#   type: bearer # or apiKey, etc.
#   # ... other auth details

# Define actions (endpoints) - Smithery might generate this from your OpenAPI spec
# You might customize descriptions or parameters here later within Smithery's UI
actions:
  # Example for the PDF extraction endpoint
  extractPdfText:
    # Corresponds to operationId or path/method in your OpenAPI spec
    operationId: postApiPdfExtractText # Hypothetical - Check your generated OpenAPI spec
    summary: Extract Text from Canvas PDF
    description: Downloads a PDF file from Canvas using its file ID and extracts the text content.
    # Parameter mapping might be needed here depending on Smithery's features
  # Add other actions (getAssignmentDescription, getCourseAssignments, etc.)
  # ...

containerPort: 3000

# List of available tools
tools:
  - name: get-courses
    description: Retrieves courses from Canvas LMS
    parameters:
      - name: limit
        description: Maximum number of courses to return
        type: number
        required: false
  
  - name: get-assignments
    description: Retrieves assignments for a specific course
    parameters:
      - name: courseId
        description: ID of the course
        type: string
        required: true 